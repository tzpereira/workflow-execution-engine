name: go

# Core/CLI/SDK checks. Independent of ui.yml — neither workflow blocks the other.
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          # Pinned to the v1 line so it matches the v1-schema .golangci.yml.
          version: v1.55.2

      - name: Test (race)
        run: go test ./... -race
