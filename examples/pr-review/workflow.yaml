# Fast, read-only PR review. This is the default product path: fetch one public
# GitHub diff and make one bounded model call. It never writes to a checkout,
# creates a branch, commits, or opens a PR. The heavier pr-review-autofix example
# is an explicit second step after a human has inspected this verdict.
id: pr-review
version: 1.1.0
inputs:
  - name: prUrl
    required: true
    description: GitHub PR URL (https://github.com/OWNER/REPO/pull/N) or API URL (https://api.github.com/repos/OWNER/REPO/pulls/N)
nodes:
  - id: fetch-diff
    tool:
      toolName: http
      input:
        method: GET
        url: "${input:prUrl}"
        urlTransform: github-pr-diff
        failOnStatus: true
        headers:
          Accept: "application/vnd.github.diff"
          Authorization: "${env:GITHUB_AUTH_HEADER:-}"

  - id: review
    worker: reviewer@1.1.0

edges:
  - { from: fetch-diff, to: review }

budget:
  maxCostUsd: 0.03
  maxTokens: 30000
  maxDurationMs: 90000
  maxRetriesPerNode: 1
