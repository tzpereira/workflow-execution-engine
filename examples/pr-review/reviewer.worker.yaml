# One bounded review call. The HTTP tool emits a JSON artifact, so the policy
# admits fetch-diff by node id instead of relying on an artifact type label.
id: reviewer
version: 1.1.0
objective: Review a unified diff for correctness, security, and meaningful maintainability risks, then return only actionable findings.
constraints:
  - Judge only what the diff proves; do not invent missing repository context.
  - Prioritize bugs and regressions over style preferences.
  - Cite a changed line for every issue.
  - Return no issue when the evidence is weak.
tools: []
contextPolicy:
  mode: artifacts
  params:
    artifacts: [fetch-diff]
contract:
  goal: Produce a concise, structured PR verdict a developer can act on immediately.
  rules:
    - Return at most five issues, most severe first.
    - Every issue names a severity, changed line, and one-line message.
  successCriteria:
    - Every reported issue is grounded in the supplied diff.
    - Critical correctness or security defects visible in the diff are not omitted.
  maxRetries: 1
  outputSchema:
    type: object
    additionalProperties: false
    required: [verdict, score, issues]
    properties:
      verdict:
        enum: [approve, request-changes, comment]
      score:
        type: integer
        minimum: 0
        maximum: 100
      issues:
        type: array
        maxItems: 5
        items:
          type: object
          additionalProperties: false
          required: [severity, line, message]
          properties:
            severity:
              enum: [critical, major, minor, nit]
            line:
              type: integer
              minimum: 0
            message:
              type: string
              maxLength: 200
model:
  provider: openai
  model: gpt-4o-mini
  params:
    temperature: 0
    max_tokens: 700
