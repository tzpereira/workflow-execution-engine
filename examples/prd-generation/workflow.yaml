# Secondary demo (VISION.md): "research -> PM -> architect -> reviewer -> PRD".
# A linear chain, each Worker scoped to the minimum it needs (contextPolicy:
# artifacts naming exactly its one predecessor, or parent-only where a step
# genuinely needs more than one upstream view) — no tool-backed steps at all,
# every artifact is a Worker's own structured Contract output.
#
# read-brief sources its path via briefPath, a declared workflow input
# (REQ-INPUT-01, M1.14a) — which brief this run generates a PRD from is
# exactly what a run's audit trail should show, so it's supplied per run
# (`wee run --input briefPath=...`, the UI's Run dialog, or POST /api/run)
# rather than an env var (see README.md).
id: prd-generation
version: 1.0.0
inputs:
  - name: briefPath
    required: true
    description: Path to the product brief to generate a PRD from
nodes:
  - id: read-brief
    tool:
      toolName: filesystem
      input:
        op: read
        path: "${input:briefPath}"

  - id: research
    worker: research@1.0.0
  - id: pm
    worker: pm@1.0.0
  - id: architect
    worker: architect@1.0.0
  - id: reviewer
    worker: prd-reviewer@1.0.0
  - id: prd
    worker: prd@1.0.0

edges:
  - { from: read-brief, to: research }
  - { from: research, to: pm }
  - { from: pm, to: architect }
  - { from: pm, to: reviewer }
  - { from: architect, to: reviewer }
  - { from: research, to: prd }
  - { from: pm, to: prd }
  - { from: architect, to: prd }
  - { from: reviewer, to: prd }

budget:
  maxCostUsd: 0.30
  maxTokens: 100000
  maxDurationMs: 120000
  maxRetriesPerNode: 2
