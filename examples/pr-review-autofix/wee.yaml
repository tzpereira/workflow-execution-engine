# Tool wiring this example needs (deny-first, PRIN-10 — nothing runs unless
# allowlisted here). Review and proposed-fix generation work against public
# PRs remotely through GitHub. workspaceRoot is only used by the local tail
# (apply-fix/test/stage/commit); set WEE_WORKSPACE_ROOT to a writable checkout
# before allowing those nodes to run. "go test ./..." only fits a Go repo —
# swap it for whatever this target repo's own test command is.
workspaceRoot: ${WEE_WORKSPACE_ROOT:-.}
terminal:
  allow: ["go"]
  timeoutMs: 60000
http:
  allow: ["api.github.com", "raw.githubusercontent.com"]
