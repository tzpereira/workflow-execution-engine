# locate-file: a cheap extraction step that gives read-original both the
# changed path and the raw GitHub URL for the file at the PR base commit. This
# keeps public-PR review/fix proposal remote-first; a local checkout is only
# needed later if the workflow actually applies/tests/commits a fix.
id: locate-file
version: 1.0.1
description: Resolves the changed file and its immutable base-version source URL.
objective: Read GitHub PR metadata plus a unified diff, then report the exact changed path and the raw URL for that file at the PR base commit.
constraints:
  - path is the path from the diff's own "+++ b/" header, with the "b/" prefix stripped — never invented, never guessed.
  - If the diff touches more than one file, path is the first file's path only — this workflow handles one file per run.
  - originalUrl must be "https://raw.githubusercontent.com/{base.repo.full_name}/{base.sha}/{path}" using base.repo.full_name and base.sha from fetch-pr's JSON body and path from the diff.
tools: []
contextPolicy:
  mode: artifacts
  params:
    artifacts: [fetch-pr, fetch-diff]
contract:
  goal: Report the workspace-relative path of the file a diff modifies and the raw URL for its original base content.
  rules:
    - path never starts with "/", "a/", or "b/" — it is a plain workspace-relative path, ready for a filesystem read.
    - originalUrl must start with "https://raw.githubusercontent.com/" and must end with "/" plus path.
  successCriteria:
    - path exactly matches the file the diff's own headers name.
    - originalUrl points at the PR base repo and base sha, not the head branch.
  maxRetries: 2
  outputSchema:
    type: object
    additionalProperties: false
    required: [path, originalUrl]
    properties:
      path:
        type: string
        maxLength: 500
      originalUrl:
        type: string
        maxLength: 1000
model:
  provider: openai
  model: gpt-4o-mini
  params:
    temperature: 0
