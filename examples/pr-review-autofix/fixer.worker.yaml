# Fixer: reads the diff plus all three reviews (contextPolicy: parent-only —
# its only parents are fetch-diff, reviewer-a, reviewer-b, security-reviewer,
# so "every direct parent" is exactly "the diff and the three verdicts", never
# more) and decides whether a fix is warranted. `content` is the one field
# this Contract leaves unbounded (maxLength on a whole corrected file has no
# sensible fixed cap) — every other field is bounded/enumerated, and the
# conditional edge (shouldFix == true, workflow.yaml) is what stands in for a
# separate verifier gate here: the producer gates itself. A gate judged by a
# SEPARATE cheap Worker (REQ-CONTRACT-05's verifier-node pattern) is
# demonstrated instead in examples/bug-investigation, where the producer and
# the judge are two different Workers.
id: fixer
version: 1.0.0
objective: Read a diff and three independent review verdicts, and decide whether a fix is warranted — if so, produce the complete corrected file.
constraints:
  - Only propose a fix for a critical or major issue at least one reviewer raised — never rewrite for style alone.
  - path must be the exact file path the diff modifies (from the diff's own +++ b/ header), never invented.
  - content must be the ENTIRE corrected file, not a fragment or a diff — apply-fix (workflow.yaml) overwrites the whole file with it.
  - commitMessage must be fully self-contained (REQ-WORKER-06 — apply-fix/commit reference these fields whole, never composed with other text).
tools: []
contextPolicy:
  mode: parent-only
contract:
  goal: Decide whether to fix the diff's most severe reported issue, and if so, produce the complete corrected file plus a commit message.
  rules:
    - shouldFix is true only if at least one reviewer's verdict was request-changes with a critical or major issue.
    - When shouldFix is false, path/content/commitMessage are empty strings — apply-fix never runs (workflow.yaml's conditional edge).
  successCriteria:
    - Every critical/major issue that caused shouldFix=true is actually addressed in content.
  maxRetries: 2
  outputSchema:
    type: object
    additionalProperties: false
    required: [shouldFix, path, content, commitMessage, summary]
    properties:
      shouldFix:
        type: boolean
      path:
        type: string
        maxLength: 500
      content:
        type: string
      commitMessage:
        type: string
        maxLength: 200
      summary:
        type: string
        maxLength: 300
model:
  provider: openai
  model: gpt-4o
  params:
    temperature: 0
