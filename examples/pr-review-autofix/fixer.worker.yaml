# Fixer: reads the diff, the three reviews, and the real original file
# (contextPolicy: parent-only — its parents are fetch-diff, reviewer-a,
# reviewer-b, security-reviewer, and read-original, workflow.yaml, so "every
# direct parent" is exactly the diff, the three verdicts, and the file itself,
# never more) and decides whether a fix is warranted. read-original exists
# specifically so fixer has real, unchanged lines to copy content from instead
# of trying to reconstruct a whole file from a diff's necessarily-partial
# context — before it existed, fixer would routinely fall back to echoing the
# diff shape it was shown (see README.md's Real-repo validation section).
# `content` is the one field this Contract leaves unbounded (maxLength on a
# whole corrected file has no sensible fixed cap) — every other field is
# bounded/enumerated, and the conditional edge (shouldFix == true,
# workflow.yaml) is what stands in for a separate verifier gate here: the
# producer gates itself. A gate judged by a SEPARATE cheap Worker
# (REQ-CONTRACT-05's verifier-node pattern) is demonstrated instead in
# examples/bug-investigation, where the producer and the judge are two
# different Workers.
id: fixer
version: 1.0.0
objective: Read a diff, three independent review verdicts, and the real original file, and decide whether a fix is warranted — if so, produce the complete corrected file.
constraints:
  - Only propose a fix for a critical or major issue at least one reviewer raised — never rewrite for style alone.
  - path must be the exact file path the diff modifies (from the diff's own +++ b/ header), never invented.
  - content must start from read-original's content field verbatim and apply only the minimal edit the fix requires — never rebuild the file from the diff, and never guess at lines the diff doesn't show; read-original already has them.
  - content must be the ENTIRE corrected file, not a fragment or a diff — apply-fix (workflow.yaml) overwrites the whole file with it.
  - content must be a minimal, targeted fix — preserve every unrelated line exactly as in read-original's content (license/copyright headers, comments, imports, unrelated functions); change only what the reported issue requires.
  - content must never contain diff/patch syntax anywhere — no lines starting with "diff --git", "index ", "+++", "---", or "@@", and no leading "+"/"-" change markers. The diff is given for context only, to know WHAT changed; your OWN answer is read-original's file, edited, not a diff, and not wrapped in a diff.
  - commitMessage must be fully self-contained (REQ-WORKER-06 — apply-fix/commit reference these fields whole, never composed with other text).
  - commitMessage must be a single line — a short imperative summary of the fix, no body, no bullet points, no trailing period.
tools: []
contextPolicy:
  mode: parent-only
contract:
  goal: Decide whether to fix the diff's most severe reported issue, and if so, produce the complete corrected file plus a commit message.
  rules:
    - shouldFix is true only if at least one reviewer's verdict was request-changes with a critical or major issue.
    - When shouldFix is false, path/content/commitMessage are empty strings — apply-fix never runs (workflow.yaml's conditional edge).
  successCriteria:
    - Every critical/major issue that caused shouldFix=true is actually addressed in content.
  maxRetries: 2
  outputSchema:
    type: object
    additionalProperties: false
    required: [shouldFix, path, content, commitMessage, summary]
    properties:
      shouldFix:
        type: boolean
      path:
        type: string
        maxLength: 500
      content:
        type: string
      commitMessage:
        type: string
        maxLength: 100
      summary:
        type: string
        maxLength: 300
model:
  provider: openai
  model: gpt-4o
  params:
    temperature: 0
