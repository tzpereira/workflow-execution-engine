# The flagship demo (VISION.md "Pull Request Review & Auto-Fix"), pulled
# forward into M1.14 so the Template gallery has a real bundle to import
# (EXECUTION.md M1.14/M1.15). Every differentiator the project claims, in one
# graph: three reviewers in parallel with a scoped context policy each, an LLM
# Fixer whose own output is judged by a separate verifier before anything is
# applied, real tool-backed test/commit steps, and node-cache reuse across
# re-runs.
#
# fetch-pr
# fetch-diff
#   +-- reviewer-a        (style & correctness)
#   +-- reviewer-b        (adversarial — assumes the diff is wrong)
#   +-- security-reviewer (vulnerabilities)      <- all three in parallel
#   +-- locate-file       (extracts the path and raw base-file URL)
#         v
#       read-original (tool: http read — the real base file locate-file named)
#         v
#       fixer        (reads the diff + all three reviews + the real original file)
#         v
#       verify-fix   (REQ-CONTRACT-05 — a separate, cheap judge; the producer
#                     never gates itself, see verify-fix.worker.yaml)
#         v (conditional: approved == true)
#       apply-fix    (tool: filesystem, writes fixer's corrected file)
#         v
#       test          (tool: terminal)
#         v
#       stage         (tool: git add)
#         v
#       commit        (tool: git commit)
#
# read-original exists because fixer, given only the diff, has nothing to
# copy the file's unchanged lines from. For public PRs, locate-file builds a
# raw.githubusercontent.com URL from the PR base repo/sha and read-original
# fetches it remotely; a local clone is only needed if the apply/test/commit
# tail runs.
#
# Reviewer context policy: `artifacts` naming fetch-diff by id, not
# `diff-only` by artifact TYPE — the generic `http` tool (core/tool/http)
# never implements the optional ArtifactType() method terminal.Tool does
# (core/engine/tool_executor.go defaults every tool's output to
# domain.ArtifactJSON), so fetch-diff's output is tagged "json", not "diff".
# A `diff-only` policy would filter it out entirely (REQ-CTXPOL-01's "nothing
# more" cuts both ways) and every reviewer would see nothing. `artifacts`
# mode filters by producing-node id instead of artifact type, so it admits
# fetch-diff's output regardless of its type tag — same effect (each
# reviewer sees only the diff, never a sibling's output), achieved with the
# mechanism that actually works against today's tool wiring.
#
# prUrl is a declared workflow input (REQ-INPUT-01, M1.14a) — picked in the
# UI's Run dialog, passed via `wee run --input prUrl=...`, or supplied through
# POST /api/run — not an env var: it's the specific thing this run reviews,
# not deployment config, so it belongs in the audit trail (unlike a secret).
# apply-fix's path/content are two separate fields, each its own whole-string
# placeholder — never concatenated into one string, so the rule isn't hit.
#
# Requires (see README.md): OPENAI_API_KEY (or ANTHROPIC_API_KEY, per each
# worker's model.provider) for the six LLM Workers. GitHub public PR reads are
# anonymous by default, with optional GITHUB_AUTH_HEADER when the public API's
# shared-IP quota is exhausted. A local checkout is only required for the
# apply-fix/test/stage/commit tail; per-repo tuning (test command, timeouts,
# budget) is expected — see M1.15's validation notes once run against real
# repositories.
id: pr-review-autofix
version: 1.0.1
inputs:
  - name: prUrl
    required: true
    description: GitHub API URL of the PR diff to review (e.g. https://api.github.com/repos/OWNER/REPO/pulls/N)
nodes:
  - id: fetch-pr
    tool:
      toolName: http
      input:
        method: GET
        url: "${input:prUrl}"
        headers:
          Accept: "application/vnd.github+json"
          Authorization: "${env:GITHUB_AUTH_HEADER:-}"

  - id: fetch-diff
    tool:
      toolName: http
      input:
        method: GET
        url: "${input:prUrl}"
        headers:
          Accept: "application/vnd.github.diff"
          Authorization: "${env:GITHUB_AUTH_HEADER:-}"

  - id: reviewer-a
    worker: reviewer-a@1.0.1
  - id: reviewer-b
    worker: reviewer-b@1.0.1
  - id: security-reviewer
    worker: security-reviewer@1.0.1

  - id: locate-file
    worker: locate-file@1.0.1

  - id: read-original
    tool:
      toolName: http
      input:
        method: GET
        url: "${locate-file.originalUrl}"
        headers:
          Accept: "text/plain"

  - id: fixer
    worker: fixer@1.0.1

  - id: verify-fix
    worker: verify-fix@1.0.1

  - id: apply-fix
    tool:
      toolName: filesystem
      input:
        op: write
        path: "${fixer.path}"
        content: "${fixer.content}"

  - id: test
    tool:
      toolName: terminal
      input:
        command: go
        args: ["test", "./..."]

  - id: stage
    tool:
      toolName: git
      input:
        op: add
        paths: ["${fixer.path}"]

  - id: commit
    tool:
      toolName: git
      input:
        op: commit
        message: "${fixer.commitMessage}"

edges:
  - { from: fetch-pr, to: locate-file }
  - { from: fetch-diff, to: reviewer-a }
  - { from: fetch-diff, to: reviewer-b }
  - { from: fetch-diff, to: security-reviewer }
  - { from: fetch-diff, to: locate-file }
  - { from: locate-file, to: read-original }
  - { from: fetch-diff, to: fixer }
  - { from: reviewer-a, to: fixer }
  - { from: reviewer-b, to: fixer }
  - { from: security-reviewer, to: fixer }
  - { from: read-original, to: fixer }
  - { from: fetch-diff, to: verify-fix }
  - { from: fixer, to: verify-fix }
  - { from: read-original, to: verify-fix }
  - { from: verify-fix, to: apply-fix, condition: { path: approved, op: truthy } }
  - { from: apply-fix, to: test }
  - { from: fixer, to: stage }
  - { from: test, to: stage }
  - { from: fixer, to: commit }
  - { from: stage, to: commit }

budget:
  maxCostUsd: 0.50
  maxTokens: 150000
  maxDurationMs: 180000
  maxRetriesPerNode: 2
